<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nile Services | Internal Admin Portal</title>
  
  <!-- FontAwesome & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-color: #09090B; color: #F4F4F5; font-family: 'Outfit', sans-serif;">

  <div class="stripe-bg-grid" style="opacity: 0.05;"></div>

  <!-- Admin Header -->
  <header class="admin-header" style="background-color: #121214; border-bottom: 1px solid #27272A; padding: 20px 0; position: sticky; top: 0; z-index: 100;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <img src="images/nile-logo.png" alt="Nile Agency Logo" style="height: 48px; background: white; padding: 4px 8px; border-radius: 6px; display: block; object-fit: contain;">
        <h1 style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em; margin: 0; text-transform: uppercase;">Admin Hub</h1>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <a href="index.html" class="btn btn-secondary btn-sm" style="color: #F4F4F5; border-color: #3F3F46; padding: 8px 16px; text-transform: none; font-size: 13px;"><i class="fa-solid fa-arrow-left"></i> Main Site</a>
        <span style="font-size: 13px; color: #A1A1AA; background: #27272A; padding: 6px 12px; border-radius: 6px;"><i class="fa-solid fa-circle-check" style="color: var(--accent-green);"></i> Connected</span>
      </div>
    </div>
  </header>

  <!-- Main Portal Workspace -->
  <main class="container" style="padding: 40px 20px;">
    
    <!-- Dashboard Stats Grid -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 40px;">
      <div class="admin-stat-card" style="background-color: #121214; border: 1px solid #27272A; border-radius: 12px; padding: 24px; position: relative;">
        <span style="font-size: 13px; color: #A1A1AA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Total Briefs</span>
        <h2 style="font-size: 36px; font-weight: 800; margin: 12px 0 0 0; color: #F4F4F5;" id="statTotal">0</h2>
        <i class="fa-solid fa-file-invoice" style="position: absolute; right: 24px; bottom: 24px; font-size: 28px; opacity: 0.15; color: var(--accent-green);"></i>
      </div>
      <div class="admin-stat-card" style="background-color: #121214; border: 1px solid #27272A; border-radius: 12px; padding: 24px; position: relative;">
        <span style="font-size: 13px; color: #A1A1AA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Logo & Branding</span>
        <h2 style="font-size: 36px; font-weight: 800; margin: 12px 0 0 0; color: #F4F4F5;" id="statLogo">0</h2>
        <i class="fa-solid fa-palette" style="position: absolute; right: 24px; bottom: 24px; font-size: 28px; opacity: 0.15; color: #A855F7;"></i>
      </div>
      <div class="admin-stat-card" style="background-color: #121214; border: 1px solid #27272A; border-radius: 12px; padding: 24px; position: relative;">
        <span style="font-size: 13px; color: #A1A1AA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Social Content</span>
        <h2 style="font-size: 36px; font-weight: 800; margin: 12px 0 0 0; color: #F4F4F5;" id="statSocial">0</h2>
        <i class="fa-solid fa-hashtag" style="position: absolute; right: 24px; bottom: 24px; font-size: 28px; opacity: 0.15; color: #06B6D4;"></i>
      </div>
      <div class="admin-stat-card" style="background-color: #121214; border: 1px solid #27272A; border-radius: 12px; padding: 24px; position: relative;">
        <span style="font-size: 13px; color: #A1A1AA; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Campaign Ads</span>
        <h2 style="font-size: 36px; font-weight: 800; margin: 12px 0 0 0; color: #F4F4F5;" id="statAds">0</h2>
        <i class="fa-solid fa-bullhorn" style="position: absolute; right: 24px; bottom: 24px; font-size: 28px; opacity: 0.15; color: #E11D48;"></i>
      </div>
    </div>

    <!-- Filters Section -->
    <div style="background-color: #121214; border: 1px solid #27272A; border-radius: 12px 12px 0 0; padding: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
      <div style="display: flex; gap: 12px; flex: 1; max-width: 500px; min-width: 280px;">
        <div style="position: relative; width: 100%;">
          <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #71717A;"></i>
          <input type="text" id="adminSearch" placeholder="Search by client or business name..." style="width: 100%; padding: 12px 16px 12px 48px; background-color: #09090B; border: 1px solid #27272A; border-radius: 8px; color: #F4F4F5; font-size: 14px; font-family: inherit;" oninput="applyFilters()">
        </div>
      </div>
      <div style="display: flex; gap: 12px; align-items: center;">
        <select id="adminFilterTrack" style="padding: 12px 16px; background-color: #09090B; border: 1px solid #27272A; border-radius: 8px; color: #F4F4F5; font-size: 14px; font-family: inherit; outline: none; cursor: pointer;" onchange="applyFilters()">
          <option value="all">All Tracks</option>
          <option value="logo">Logo & Branding</option>
          <option value="social">Social Media</option>
          <option value="ads">Paid Ads</option>
        </select>
        <button onclick="clearAllBriefs()" class="btn btn-secondary btn-sm" style="color: #EF4444; border-color: rgba(239, 68, 68, 0.2); background: rgba(239, 68, 68, 0.05); text-transform: none; padding: 10px 16px; font-size: 13px;"><i class="fa-solid fa-trash-can"></i> Clear All</button>
      </div>
    </div>

    <!-- Briefs Table Frame -->
    <div style="background-color: #121214; border: 1px solid #27272A; border-top: none; border-radius: 0 0 12px 12px; overflow-x: auto;">
      <table style="width: 100%; border-collapse: collapse; text-align: left; min-width: 800px;">
        <thead>
          <tr style="border-bottom: 1px solid #27272A; background-color: #18181B;">
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700; width: 140px;">Date</th>
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700;">Client</th>
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700;">Business</th>
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700; width: 180px;">Service Track</th>
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700; width: 160px;">Contact</th>
            <th style="padding: 16px 24px; font-size: 12px; text-transform: uppercase; color: #A1A1AA; font-weight: 700; width: 180px; text-align: center;">Actions</th>
          </tr>
        </thead>
        <tbody id="briefsTableBody">
          <!-- Populated dynamically via admin.js -->
        </tbody>
      </table>
      
      <!-- Empty state inside table -->
      <div id="tableEmptyState" style="display: none; text-align: center; padding: 80px 20px; background-color: #121214;">
        <i class="fa-solid fa-folder-open" style="font-size: 48px; color: #3F3F46; margin-bottom: 16px;"></i>
        <h3 style="font-size: 16px; font-weight: 700; color: #A1A1AA; margin-bottom: 6px;">No Briefs Found</h3>
        <p style="font-size: 13px; color: #71717A;">When clients complete onboarding, their briefs will be listed here.</p>
      </div>
    </div>

  </main>

  <!-- Detailed Brief Overlay Drawer -->
  <div id="briefModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(9, 9, 11, 0.85); backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center;">
    <div style="background-color: #121214; border: 1px solid #27272A; width: 90%; max-width: 680px; max-height: 85vh; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 24px 48px rgba(0,0,0,0.5);">
      
      <!-- Modal Header -->
      <div style="padding: 24px; background-color: #18181B; border-bottom: 1px solid #27272A; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <span style="font-size: 11px; text-transform: uppercase; font-weight: 800; background: var(--accent-green); color: #09090B; padding: 4px 8px; border-radius: 4px;" id="modalTrackBadge">Logo</span>
          <h2 style="font-size: 18px; font-weight: 800; margin: 8px 0 0 0;" id="modalClientName">Client Brief Summary</h2>
        </div>
        <button onclick="closeModal()" style="background: transparent; border: none; color: #A1A1AA; font-size: 20px; cursor: pointer; transition: color 0.2s;"><i class="fa-solid fa-xmark"></i></button>
      </div>
      
      <!-- Modal Content (Scrollable) -->
      <div style="padding: 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; font-size: 14px; line-height: 1.6;" id="modalContent">
        <!-- Injected dynamic detail key-value pairs -->
      </div>
      
      <!-- Modal Footer -->
      <div style="padding: 20px 24px; background-color: #18181B; border-top: 1px solid #27272A; display: flex; justify-content: flex-end; gap: 12px;">
        <button class="btn btn-secondary btn-sm" style="color: #F4F4F5; border-color: #3F3F46; text-transform: none;" onclick="closeModal()">Close</button>
        <button class="btn btn-primary btn-sm" style="text-transform: none;" id="btnModalWhatsApp"><i class="fa-brands fa-whatsapp"></i> Chat on WhatsApp</button>
      </div>

    </div>
  </div>

  <!-- Table Styling Override -->
  <style>
    .admin-table-row {
      border-bottom: 1px solid #27272A;
      transition: background-color 0.2s;
    }
    .admin-table-row:hover {
      background-color: #18181B;
    }
  </style>

  <!-- Portal Scripts -->
  <script src="js/admin.js"></script>
</body>
</html>
